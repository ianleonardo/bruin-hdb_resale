name: sggovdata.resale_flat_price
type: ingestr
connection: gcp

depends:
  - download_to_gcs

parameters:
  destination: bigquery
  enforce_schema: "true"
  incremental_strategy: replace
  source_connection: gcs
  source_table: datagovsg/ResaleflatpricesbasedonregistrationdatefromJan2017onwards.csv

secrets:
  - key: gcp
    inject_as: gcp

columns:
  - name: month
    type: STRING
    checks:
      - name: pattern
        value: ____-__
  - name: town
    type: STRING
  - name: flat_type
    type: STRING
  - name: block
    type: STRING
  - name: street_name
    type: STRING
  - name: storey_range
    type: STRING
  - name: floor_area_sqm
    type: FLOAT
    checks:
      - name: positive
  - name: flat_model
    type: STRING
  - name: lease_commence_date
    type: INTEGER
  - name: remaining_lease
    type: STRING
  - name: resale_price
    type: FLOAT
    checks:
      - name: positive
